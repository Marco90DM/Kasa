# =============================================================
# docker-compose.yml
# =============================================================
@"
version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: kasa_postgres_dev
    environment:
      POSTGRES_DB: kasa_dev
      POSTGRES_USER: kasa
      POSTGRES_PASSWORD: kasa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/KASA.API/Dockerfile
    container_name: kasa_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=kasa_dev;Username=kasa;Password=kasa_dev_password
    ports:
      - "5000:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
