# KASA — Gestione Integrata del Nucleo Convivente

Piattaforma SaaS multi-tenant per la gestione collaborativa di finanze e alimentazione.

## Stack
- Backend: .NET 10 / ASP.NET Core 10 / C# 13
- ORM: Entity Framework Core 10 + Npgsql (PostgreSQL)
- Frontend Web: Blazor Server + MudBlazor
- Mobile: .NET MAUI (iOS + Android)
- Real-time: SignalR
- Database: PostgreSQL (prod: Azure Flexible Server / dev: Neon serverless)

## Struttura Solution

\\\
KASA.sln
├── src/
│   ├── KASA.Domain/          # Entities, Value Objects, Domain Events
│   ├── KASA.Application/     # Use Cases, Commands, Queries, MediatR
│   ├── KASA.Infrastructure/  # EF Core, PostgreSQL, OCR, Email, Push
│   ├── KASA.API/             # REST Controllers, SignalR Hubs, Auth
│   ├── KASA.Web/             # Blazor Server + MudBlazor
│   └── KASA.Mobile/          # .NET MAUI iOS + Android
└── tests/
    ├── KASA.Domain.Tests/
    ├── KASA.Application.Tests/
    └── KASA.Integration.Tests/
\\\

## Ambienti
| Ambiente | Database | Deploy |
|---|---|---|
| dev | Neon serverless PostgreSQL | locale |
| staging | Azure PostgreSQL Flexible Server | Azure App Service |
| production | Azure PostgreSQL Flexible Server | Azure App Service |

