name: KASA CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/marco90dm/kasa-api
  WEB_IMAGE: ghcr.io/marco90dm/kasa-web

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Domain
        run: dotnet restore src/KASA.Domain/KASA.Domain.csproj

      - name: Restore Application
        run: dotnet restore src/KASA.Application/KASA.Application.csproj

      - name: Restore Infrastructure
        run: dotnet restore src/KASA.Infrastructure/KASA.Infrastructure.csproj

      - name: Restore API
        run: dotnet restore src/KASA.API/KASA.API.csproj

      - name: Restore Web
        run: dotnet restore src/KASA.Web/KASA.Web.csproj

      - name: Restore Domain.Tests
        run: dotnet restore tests/KASA.Domain.Tests/KASA.Domain.Tests.csproj

      - name: Restore Application.Tests
        run: dotnet restore tests/KASA.Application.Tests/KASA.Application.Tests.csproj

      - name: Restore Integration.Tests
        run: dotnet restore tests/KASA.Integration.Tests/KASA.Integration.Tests.csproj

      - name: Build
        run: |
          dotnet build src/KASA.Domain/KASA.Domain.csproj -c Release --no-restore
          dotnet build src/KASA.Application/KASA.Application.csproj -c Release --no-restore
          dotnet build src/KASA.Infrastructure/KASA.Infrastructure.csproj -c Release --no-restore
          dotnet build src/KASA.API/KASA.API.csproj -c Release --no-restore
          dotnet build src/KASA.Web/KASA.Web.csproj -c Release --no-restore

      - name: Test
        run: |
          dotnet test tests/KASA.Domain.Tests/KASA.Domain.Tests.csproj -c Release --verbosity normal
          dotnet test tests/KASA.Application.Tests/KASA.Application.Tests.csproj -c Release --verbosity normal
          dotnet test tests/KASA.Integration.Tests/KASA.Integration.Tests.csproj -c Release --verbosity normal

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/KASA.API/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/KASA.Web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/kasa
            docker login ghcr.io -u marco90dm -p ${{ secrets.GHCR_TOKEN }}
            docker compose pull api web
            docker compose up -d --no-deps --force-recreate api web
            sleep 15
            docker compose ps
            echo "Deploy completato: $(date)"
