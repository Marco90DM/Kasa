name: KASA CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/marco90dm/kasa-api
  WEB_IMAGE: ghcr.io/marco90dm/kasa-web

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Domain
        run: dotnet restore src/KASA.Domain/KASA.Domain.csproj

      - name: Restore Application
        run: dotnet restore src/KASA.Application/KASA.Application.csproj

      - name: Restore Infrastructure
        run: dotnet restore src/KASA.Infrastructure/KASA.Infrastructure.csproj

      - name: Restore API
        run: dotnet restore src/KASA.API/KASA.API.csproj

      - name: Restore Web
        run: dotnet restore src/KASA.Web/KASA.Web.csproj

      - name: Restore Domain Tests
        run: dotnet restore tests/KASA.Domain.Tests/KASA.Domain.Tests.csproj

      - name: Restore Application Tests
        run: dotnet restore tests/KASA.Application.Tests/KASA.Application.Tests.csproj

      - name: Restore Integration Tests
        run: dotnet restore tests/KASA.Integration.Tests/KASA.Integration.Tests.csproj

      - name: Build
        run: |
          dotnet build src/KASA.Domain/KASA.Domain.csproj --no-restore
          dotnet build src/KASA.Application/KASA.Application.csproj --no-restore
          dotnet build src/KASA.Infrastructure/KASA.Infrastructure.csproj --no-restore
          dotnet build src/KASA.API/KASA.API.csproj --no-restore
          dotnet build src/KASA.Web/KASA.Web.csproj --no-restore

      - name: Test
        run: |
          dotnet test tests/KASA.Domain.Tests/KASA.Domain.Tests.csproj --no-restore
          dotnet test tests/KASA.Application.Tests/KASA.Application.Tests.csproj --no-restore
          dotnet test tests/KASA.Integration.Tests/KASA.Integration.Tests.csproj --no-restore

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/KASA.API/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/KASA.Web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: docker
    steps:
      - name: Deploy
        run: |
          cd /opt/kasa
          docker login ghcr.io -u marco90dm -p ${{ secrets.GHCR_TOKEN }}
          docker compose pull api web
          docker compose up -d --no-deps --force-recreate api web
          sleep 15
          docker compose ps
          echo "Deploy completato: $(date)"