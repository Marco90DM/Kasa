name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore KASA.sln

      - name: Build
        run: dotnet build KASA.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test KASA.sln --no-build --configuration Release --verbosity normal
